<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F0F23">
<title>文化路夜市遊戲中心</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap');

:root {
  --rf-primary:    #7C3AED;
  --rf-accent:     #F43F5E;
  --rf-cyan:       #22D3EE;
  --rf-gold:       #FFD15A;
  
  --bg:         #0F0F23;
  --bg-panel:   #1a1a2e;
  --bg-card:    #2d2d42;
  
  --text:       #E2E8F0;
  --text-dim:   #94A3B8;

  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast:    150ms;
  --dur-base:    250ms;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Nunito', "PingFang TC", "Microsoft JhengHei", sans-serif;
  background-color: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-image:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(124, 58, 237, 0.05) 2px,
      rgba(124, 58, 237, 0.05) 3px
    ),
    radial-gradient(800px 500px at 15% -10%, rgba(244, 63, 94, 0.2), transparent 55%),
    radial-gradient(800px 500px at 85% 110%, rgba(124, 58, 237, 0.22), transparent 55%),
    radial-gradient(600px 400px at 50% 50%, rgba(34, 211, 238, 0.08), transparent 65%),
    linear-gradient(180deg, #0F0F23 0%, #0a0a14 100%);
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.hero {
  text-align: center;
  margin-bottom: 40px;
}

.hero-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(40px, 10vw, 56px);
  letter-spacing: 5px;
  background: linear-gradient(120deg, #F43F5E 0%, #A78BFA 50%, #22D3EE 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 40px rgba(244, 63, 94, 0.4), 0 0 60px rgba(124, 58, 237, 0.3);
  filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.1));
  margin-bottom: 12px;
}

.hero-sub {
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 2px;
  font-size: 16px;
}

.game-menu {
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
  max-width: 400px;
}

.game-card {
  display: flex;
  flex-direction: column;
  background: rgba(26, 26, 46, 0.6);
  border: 2px solid rgba(124, 58, 237, 0.3);
  border-radius: 20px;
  padding: 24px;
  text-decoration: none;
  color: var(--text);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: transform var(--dur-fast) var(--ease-spring),
              box-shadow var(--dur-base) ease,
              border-color var(--dur-base) ease;
}

.game-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent);
  pointer-events: none;
}

.game-card:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--rf-accent);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 40px rgba(244, 63, 94, 0.25);
  z-index: 2;
}

.t-bingo { border-color: rgba(255, 209, 90, 0.4); }
.t-bingo:hover { border-color: var(--rf-gold); box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 40px rgba(255, 209, 90, 0.25); }

.t-snake { border-color: rgba(34, 211, 238, 0.4); }
.t-snake:hover { border-color: var(--rf-cyan); box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 40px rgba(34, 211, 238, 0.25); }

.card-icon {
  font-size: 48px;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

.card-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.card-desc {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.5;
  font-weight: 500;
}

.badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--rf-accent);
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  box-shadow: 0 4px 12px rgba(244, 63, 94, 0.4);
}

@media (min-width: 600px) {
  .game-menu {
    max-width: 800px;
    flex-direction: row;
  }
  .game-card { flex: 1; }
}
</style>
</head>
<body>

  <div class="hero">
    <div class="hero-title">文化路夜市</div>
    <div class="hero-sub">派對遊戲中心</div>
  </div>

  <div class="game-menu">
    <a href="夜市連線.html" class="game-card t-bingo">
      <div class="badge">HOT</div>
      <div class="card-icon">🎯</div>
      <div class="card-title">夜市連線</div>
      <div class="card-desc">7×7 格子賓果連線大戰！買小吃、搶格子，看看哪一隊能最快達成指定的連線數量！支援單機輪流與連線對戰。</div>
    </a>

    <a href="食字路口.html" class="game-card t-snake">
      <div class="card-icon">🗣️</div>
      <div class="card-title">食字路口</div>
      <div class="card-desc">字詞接龍吃透透！使用你眼前的食物發動連鎖接龍，挑戰連續 Combo，解鎖超多隱藏成就拿高分！</div>
    </a>
  </div>

</body>
</html>
